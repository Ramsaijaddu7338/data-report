<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royal’s Logistics | Day Fleet Present Report</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      font-family: "Poppins", sans-serif;
    }

    body{
      background: radial-gradient(circle at top left, #e8f1ff 0%, #f7f9ff 40%, #f6f8fc 100%);
      min-height: 100vh;
    }

    /* Page Container */
    .page-wrap{
      max-width: 1200px;
      margin: auto;
    }

    /* Top Header */
    .top-header{
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 22px;
      padding: 20px 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand-left{
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon{
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #9333ea);
      color: white;
      box-shadow: 0 10px 25px rgba(37,99,235,0.35);
      font-size: 20px;
    }

    .brand-title{
      margin: 0;
      font-weight: 800;
      font-size: 22px;
      color: #0b1220;
      letter-spacing: 0.2px;
    }

    .brand-sub{
      margin: 0;
      font-size: 13px;
      color: #5b677a;
      font-weight: 500;
    }

    .pill{
      background: rgba(37,99,235,0.10);
      color: #2563eb;
      border: 1px solid rgba(37,99,235,0.18);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }

    /* Cards */
    .card{
      border: 0 !important;
      border-radius: 22px !important;
      overflow: hidden;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.08);
    }

    .card-head{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card-title{
      font-size: 16px;
      font-weight: 800;
      margin: 0;
      color: #0b1220;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .soft-icon{
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 16px;
      background: rgba(37,99,235,0.10);
      color: #2563eb;
      border: 1px solid rgba(37,99,235,0.15);
    }

    /* Textarea */
    textarea.form-control{
      border-radius: 16px !important;
      border: 1px solid rgba(0,0,0,0.10) !important;
      background: rgba(255,255,255,0.65) !important;
      box-shadow: none !important;
      font-size: 14px;
      padding: 14px;
      transition: all 0.2s ease;
    }

    textarea.form-control:focus{
      border-color: rgba(37,99,235,0.55) !important;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12) !important;
      background: rgba(255,255,255,0.9) !important;
    }

    /* Buttons */
    .btn{
      border-radius: 14px !important;
      font-weight: 700 !important;
      padding: 10px 14px !important;
    }

    .btn-primary{
      background: linear-gradient(135deg, #2563eb, #9333ea) !important;
      border: 0 !important;
      box-shadow: 0 12px 25px rgba(37,99,235,0.25);
    }

    .btn-primary:hover{
      transform: translateY(-1px);
      box-shadow: 0 18px 32px rgba(147,51,234,0.25);
    }

    .btn-outline-secondary{
      border: 1px solid rgba(0,0,0,0.15) !important;
      background: rgba(255,255,255,0.65) !important;
      color: #0b1220 !important;
    }

    .btn-outline-secondary:hover{
      background: rgba(0,0,0,0.04) !important;
    }

    .btn-success{
      background: linear-gradient(135deg, #22c55e, #16a34a) !important;
      border: 0 !important;
      box-shadow: 0 10px 22px rgba(34,197,94,0.25);
    }

    .btn-success:hover{
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(34,197,94,0.25);
    }

    /* Report Box */
    .report-box{
      background: linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      color: #eaf2ff;
      border-radius: 18px;
      padding: 16px;
      min-height: 440px;
      overflow: auto;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.65;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* Scrollbar */
    .report-box::-webkit-scrollbar{
      width: 10px;
    }
    .report-box::-webkit-scrollbar-track{
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
    }
    .report-box::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }
    .report-box::-webkit-scrollbar-thumb:hover{
      background: rgba(255,255,255,0.28);
    }

    /* Small helper text */
    .helper-text{
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.14);
      color: #1e40af;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 12px;
    }

    /* Footer */
    footer{
      opacity: 0.7;
    }

    /* Responsive */
    @media(max-width: 768px){
      .top-header{
        flex-direction: column;
        align-items: flex-start;
      }
      .pill{
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="container py-4 page-wrap">

    <div class="top-header mb-4">
      <div class="brand-left">
        <div class="brand-icon">
          <i class="fa-solid fa-truck-fast"></i>
        </div>
        <div>
          <h1 class="brand-title">Royal’s Logistics</h1>
          <p class="brand-sub">Day Fleet Present Report Generator</p>
        </div>
      </div>
      <div class="pill">
        ✅ Paste Data → Generate → Copy Output
      </div>
    <style>
      .back-btn {
        background: linear-gradient(135deg, #2563eb, #9333ea);
        border: 0;
        box-shadow: 0 12px 25px rgba(37,99,235,0.25);
        border-radius: 14px;
        padding: 10px 14px;
        font-weight: 700;
        color: white;
        text-decoration: none;
      }

      .back-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 32px rgba(37,99,235,0.25);
      }
    </style>

    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
    </div>

    <div class="row g-4">
      <!-- INPUT -->
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body p-4">
            <div class="card-head">
              <h5 class="card-title">
                <span class="soft-icon"><i class="fa-solid fa-file-lines"></i></span>
                Paste Data
              </h5>
            </div>

            <label class="form-label text-muted small fw-semibold">Paste your raw trip data below:</label>
            <textarea id="rawInput" class="form-control" rows="18"
              placeholder="Paste your data here..."></textarea>

            <div class="d-flex flex-wrap gap-2 mt-3">
              <button class="btn btn-primary px-4" onclick="generateReport()">
                <i class="fa-solid fa-wand-magic-sparkles me-2"></i>Generate Report
              </button>

              <button class="btn btn-outline-secondary px-4" onclick="clearAll()">
                <i class="fa-solid fa-trash me-2"></i>Clear
              </button>
            </div>

            <div class="helper-text">
              ✅ Supported: Login/Logout Time + Fleet No + Location + Trip Code (Txxxxx)
            </div>

          </div>
        </div>
      </div>

      <!-- OUTPUT -->
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body p-4">
            <div class="card-head">
              <h5 class="card-title">
                <span class="soft-icon"><i class="fa-solid fa-list-check"></i></span>
                Output Report
              </h5>

              <button class="btn btn-success px-4" onclick="copyOutput()">
                <i class="fa-solid fa-copy me-2"></i>Copy
              </button>
            </div>

            <div id="reportBox" class="report-box">
              <div class="text-center py-5" style="color: rgba(234,242,255,0.75);">
                <i class="fa-solid fa-circle-info fs-2 mb-2"></i>
                <p class="mb-0 fw-semibold">Output will appear here after generating ✅</p>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>

    <footer class="text-center mt-4 small">
      © Royal’s Logistics | Report Generator
    </footer>

  </div>

  <!-- ✅ YOUR JS CODE (NOT CHANGED) -->
  <script>
    function generateReport() {
      const input = document.getElementById("rawInput").value.trim();

      if (!input) {
        document.getElementById("reportBox").innerHTML =
          `<div class="text-warning text-center py-5">
            <i class="fa-solid fa-triangle-exclamation fs-2 mb-2"></i>
            <p class="mb-0">Please paste data first ✅</p>
          </div>`;
        return;
      }

      // Get date like "19 Jan 26"
      const dateMatch = input.match(/\b(\d{1,2}\s+[A-Za-z]{3}\s+\d{2})\b/);
      let reportDate = dateMatch ? dateMatch[1] : "Unknown Date";

      // Convert to format 19/01/2026 if possible
      const formattedDate = convertDateToDDMMYYYY(reportDate);

      // Extract Trip Blocks
      // Each block starts with date + "Royals Logistics - XXXX" + "Login/Logout HH:MM"
      const lines = input.split("\n").map(l => l.trim()).filter(Boolean);

      const trips = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Matches "19 Jan 26    Royals Logistics - 16    Login 11:30    TG-36-T-0016 ... Uppal ... T11750"
        const tripRegex = /^(\d{1,2}\s+[A-Za-z]{3}\s+\d{2})\s+Royals Logistics\s*-\s*([0-9]+)\s+(Login|Logout)\s+(\d{1,2}:\d{2})\s+([A-Z0-9\-]+)\s+(.+?)\s+Qnity Electronics Hyd\s+(\d{10})\s+.*?\s+(T\d+)/i;

        const match = line.match(tripRegex);

        if (match) {
          const date = match[1];
          const fleetNo = match[2].padStart(4, "0"); // 16 => 0016
          const type = match[3]; // Login/Logout
          const time = match[4];
          const cabNo = match[5]; // TG-36-T-0016
          const driverName = match[6]; // M RAJASEKHAR ...
          const driverPhone = match[7];
          const tripCode = match[8];

          // Find location after passenger list: look ahead for lines like: "1 09:30 NAME Male ADDRESS Qnity Electronics-Hyd UPPAL 8686..."
          // We will find first "Area" field (like UPPAL, RAMANTHAPUR...)
          let area = "Unknown";

          for (let j = i + 1; j < i + 12 && j < lines.length; j++) {
            // Passenger row detection:
            // "1 09:30 JAGADISH... Male ... Qnity Electronics-Hyd UPPAL 8686..."
            const areaRegex = /Qnity Electronics-Hyd\s+([A-Za-z\-\s\(\)\'\.]+)\s+\d/;
            const m2 = lines[j].match(areaRegex);
            if (m2) {
              area = m2[1].trim();
              break;
            }
          }

          trips.push({
            date,
            fleetNo,
            type,
            time,
            area,
            tripCode
          });
        }
      }

      // Group by Login/Logout and time
      const loginGroups = {};
      const logoutGroups = {};

      trips.forEach(t => {
        const key = t.time;
        const itemText = `${t.fleetNo} – ${t.area} – ${t.tripCode}`;

        if (t.type.toLowerCase() === "login") {
          if (!loginGroups[key]) loginGroups[key] = [];
          loginGroups[key].push(itemText);
        } else {
          if (!logoutGroups[key]) logoutGroups[key] = [];
          logoutGroups[key].push(itemText);
        }
      });

      // Sort times properly
      const sortedLoginTimes = Object.keys(loginGroups).sort(sortTimes);
      const sortedLogoutTimes = Object.keys(logoutGroups).sort(sortTimes);

      // Count totals
      const totalLogins = trips.filter(t => t.type.toLowerCase() === "login").length;
      const totalLogouts = trips.filter(t => t.type.toLowerCase() === "logout").length;
      const totalTrips = totalLogins + totalLogouts;

      // Build output text
      let output = `Day Fleet Present Report ${formattedDate}\n\n`;

      sortedLoginTimes.forEach(time => {
        output += `🟩 ${time} Login\n\n`;
        loginGroups[time].forEach((item, idx) => {
          output += `${idx + 1} ${item}\n`;
        });
        output += `\n`;
      });

      output += `🔻 Logout Section\n\n`;

      sortedLogoutTimes.forEach(time => {
        output += `🔻 ${time} Logout\n\n`;
        logoutGroups[time].forEach((item, idx) => {
          output += `${idx + 1} ${item}\n`;
        });
        output += `\n`;
      });

      output += `✅ Summary\n\n`;
      output += `Total Logins: ${totalLogins}\n`;
      output += `Total Logouts: ${totalLogouts}\n`;
      output += `Total Trips: ${totalTrips}\n`;

      // Show in UI
      document.getElementById("reportBox").textContent = output;
    }

    function clearAll() {
      document.getElementById("rawInput").value = "";
      document.getElementById("reportBox").innerHTML =
        `<div class="text-muted text-center py-5">
          <i class="fa-solid fa-circle-info fs-2 mb-2"></i>
          <p class="mb-0">Output will appear here after generating ✅</p>
        </div>`;
    }

    function copyOutput() {
      const text = document.getElementById("reportBox").textContent;
      if (!text.trim()) return;

      navigator.clipboard.writeText(text).then(() => {
        alert("✅ Output copied successfully!");
      });
    }

    function sortTimes(a, b) {
      const [ah, am] = a.split(":").map(Number);
      const [bh, bm] = b.split(":").map(Number);
      return (ah * 60 + am) - (bh * 60 + bm);
    }

    function convertDateToDDMMYYYY(dateStr) {
      // "19 Jan 26" => "19/01/2026"
      const months = {
        Jan: "01", Feb: "02", Mar: "03", Apr: "04",
        May: "05", Jun: "06", Jul: "07", Aug: "08",
        Sep: "09", Oct: "10", Nov: "11", Dec: "12"
      };

      const parts = dateStr.split(" ");
      if (parts.length !== 3) return dateStr;

      const dd = parts[0].padStart(2, "0");
      const mm = months[parts[1]] || "01";
      const yy = parts[2];

      const yyyy = "20" + yy; // 26 => 2026
      return `${dd}/${mm}/${yyyy}`;
    }
  </script>

</body>
</html>
